<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bodyColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8ec"/>
      <stop offset="50%" stop-color="#d4d4dc"/>
      <stop offset="100%" stop-color="#c0c0c8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a90b8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="chromeOrig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="chromeBlack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="wheelOrig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <linearGradient id="wheelGunmetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a5a5e"/>
      <stop offset="40%" stop-color="#7a7a80"/>
      <stop offset="60%" stop-color="#6a6a6e"/>
      <stop offset="100%" stop-color="#4a4a4e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="500" fill="#f0f0f5"/>
  <!-- Ground line -->
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#c0c0c8" stroke-width="1"/>
  <rect x="0" y="400" width="1200" height="100" fill="#e2e2e8"/>

  <!-- ═══════════════════════════════════ -->
  <!-- LABELS -->
  <!-- ═══════════════════════════════════ -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#64748b">BEFORE — Stock Chrome &amp; Silver Wheels</text>
  <text x="900" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">AFTER — Black Chrome &amp; Gunmetal Wheels</text>

  <!-- ═══════════════════════════════════ -->
  <!-- BEFORE: STOCK TOURAN (x: 20-580)  -->
  <!-- ═══════════════════════════════════ -->
  <g transform="translate(20, 0)">
    <!-- Shadow under car -->
    <ellipse cx="280" cy="398" rx="250" ry="8" fill="#000" opacity="0.15"/>

    <!-- Body -->
    <path d="M 40 310 L 40 260 L 70 240 L 100 220 L 180 200 L 400 200 L 480 220 L 510 240 L 530 260 L 530 310 L 530 370 L 40 370 Z" fill="url(#bodyColor)" filter="url(#shadow)"/>

    <!-- Roof -->
    <path d="M 100 220 L 180 200 L 400 200 L 480 220 L 470 230 L 110 230 Z" fill="url(#bodyColor)"/>

    <!-- Windows -->
    <!-- Front quarter window -->
    <path d="M 110 228 L 140 215 L 140 260 L 110 260 Z" fill="url(#glass)"/>
    <!-- Front window -->
    <path d="M 150 215 L 240 208 L 240 260 L 140 260 L 140 215 Z" fill="url(#glass)"/>
    <!-- Rear window -->
    <path d="M 252 208 L 370 208 L 380 260 L 240 260 L 240 208 Z" fill="url(#glass)"/>
    <!-- Rear quarter -->
    <path d="M 380 208 L 460 228 L 460 260 L 380 260 Z" fill="url(#glass)"/>

    <!-- Window chrome trim — STOCK SILVER -->
    <path d="M 110 228 L 140 215 L 240 208 L 370 208 L 460 228" fill="none" stroke="url(#chromeOrig)" stroke-width="2.5"/>
    <!-- Lower window chrome -->
    <line x1="140" y1="261" x2="460" y2="261" stroke="url(#chromeOrig)" stroke-width="2.5"/>

    <!-- Front grille chrome — STOCK SILVER -->
    <rect x="45" y="270" width="55" height="15" fill="#111" rx="2"/>
    <rect x="45" y="270" width="55" height="4" fill="url(#chromeOrig)" rx="1"/>
    <rect x="45" y="281" width="55" height="4" fill="url(#chromeOrig)" rx="1"/>
    <!-- VW badge -->
    <circle cx="72" cy="277" r="8" fill="none" stroke="#c0c0c0" stroke-width="1.5"/>

    <!-- Headlights -->
    <path d="M 40 280 L 50 275 L 55 300 L 40 305 Z" fill="#fff8e1" opacity="0.8"/>
    <!-- Taillights -->
    <path d="M 525 280 L 535 275 L 535 305 L 525 310 Z" fill="#e53e3e" opacity="0.7"/>

    <!-- Front bumper chrome — STOCK -->
    <line x1="50" y1="330" x2="100" y2="330" stroke="url(#chromeOrig)" stroke-width="2"/>

    <!-- Rear bumper chrome — STOCK -->
    <line x1="480" y1="335" x2="525" y2="335" stroke="url(#chromeOrig)" stroke-width="2"/>

    <!-- Door lines -->
    <line x1="240" y1="220" x2="240" y2="370" stroke="#c0c0c8" stroke-width="1"/>
    <line x1="370" y1="220" x2="370" y2="370" stroke="#c0c0c8" stroke-width="1"/>
    <!-- Door handles -->
    <rect x="230" y="290" width="12" height="4" fill="#c0c0c8" rx="1"/>
    <rect x="360" y="290" width="12" height="4" fill="#c0c0c8" rx="1"/>

    <!-- Side mirror -->
    <ellipse cx="135" cy="275" rx="8" ry="5" fill="url(#bodyColor)" stroke="#c0c0c8" stroke-width="1"/>

    <!-- Wheels — STOCK SILVER -->
    <!-- Front wheel -->
    <circle cx="140" cy="370" r="32" fill="#1a1a1a"/>
    <circle cx="140" cy="370" r="28" fill="url(#wheelOrig)"/>
    <circle cx="140" cy="370" r="20" fill="none" stroke="#d0d0d0" stroke-width="1"/>
    <circle cx="140" cy="370" r="6" fill="#c0c0c0"/>
    <!-- Spokes -->
    <line x1="140" y1="342" x2="140" y2="398" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="112" y1="370" x2="168" y2="370" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="120" y1="350" x2="160" y2="390" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="160" y1="350" x2="120" y2="390" stroke="#c0c0c0" stroke-width="3"/>

    <!-- Rear wheel -->
    <circle cx="420" cy="370" r="32" fill="#1a1a1a"/>
    <circle cx="420" cy="370" r="28" fill="url(#wheelOrig)"/>
    <circle cx="420" cy="370" r="20" fill="none" stroke="#d0d0d0" stroke-width="1"/>
    <circle cx="420" cy="370" r="6" fill="#c0c0c0"/>
    <line x1="420" y1="342" x2="420" y2="398" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="392" y1="370" x2="448" y2="370" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="400" y1="350" x2="440" y2="390" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="440" y1="350" x2="400" y2="390" stroke="#c0c0c0" stroke-width="3"/>

    <!-- Tire -->
    <circle cx="140" cy="370" r="32" fill="none" stroke="#2a2a2a" stroke-width="8"/>
    <circle cx="420" cy="370" r="32" fill="none" stroke="#2a2a2a" stroke-width="8"/>

    <!-- Ride height indicator -->
    <line x1="100" y1="365" x2="100" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="95" y="335" font-size="9" fill="#94a3b8" font-family="Arial">Stock</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- AFTER: BLACKED-OUT TOURAN          -->
  <!-- ═══════════════════════════════════ -->
  <g transform="translate(620, 0)">
    <!-- Shadow under car -->
    <ellipse cx="280" cy="398" rx="250" ry="8" fill="#000" opacity="0.15"/>

    <!-- Body — same color, slightly lowered -->
    <path d="M 40 316 L 40 266 L 70 246 L 100 226 L 180 206 L 400 206 L 480 226 L 510 246 L 530 266 L 530 316 L 530 370 L 40 370 Z" fill="url(#bodyColor)" filter="url(#shadow)"/>

    <!-- Roof -->
    <path d="M 100 226 L 180 206 L 400 206 L 480 226 L 470 236 L 110 236 Z" fill="url(#bodyColor)"/>

    <!-- Windows -->
    <path d="M 110 234 L 140 221 L 140 266 L 110 266 Z" fill="url(#glass)"/>
    <path d="M 150 221 L 240 214 L 240 266 L 140 266 L 140 221 Z" fill="url(#glass)"/>
    <path d="M 252 214 L 370 214 L 380 266 L 240 266 L 240 214 Z" fill="url(#glass)"/>
    <path d="M 380 214 L 460 234 L 460 266 L 380 266 Z" fill="url(#glass)"/>

    <!-- Window trim — BLACKED OUT -->
    <path d="M 110 234 L 140 221 L 240 214 L 370 214 L 460 234" fill="none" stroke="url(#chromeBlack)" stroke-width="2.5"/>
    <line x1="140" y1="267" x2="460" y2="267" stroke="url(#chromeBlack)" stroke-width="2.5"/>

    <!-- Front grille — BLACKED OUT -->
    <rect x="45" y="276" width="55" height="15" fill="#111" rx="2"/>
    <rect x="45" y="276" width="55" height="4" fill="url(#chromeBlack)" rx="1"/>
    <rect x="45" y="287" width="55" height="4" fill="url(#chromeBlack)" rx="1"/>
    <circle cx="72" cy="283" r="8" fill="none" stroke="#555" stroke-width="1.5"/>

    <!-- Headlights -->
    <path d="M 40 286 L 50 281 L 55 306 L 40 311 Z" fill="#fff8e1" opacity="0.8"/>
    <!-- Taillights -->
    <path d="M 525 286 L 535 281 L 535 311 L 525 316 Z" fill="#e53e3e" opacity="0.7"/>

    <!-- Front bumper trim — BLACKED OUT -->
    <line x1="50" y1="336" x2="100" y2="336" stroke="url(#chromeBlack)" stroke-width="2"/>

    <!-- Rear bumper trim — BLACKED OUT -->
    <line x1="480" y1="341" x2="525" y2="341" stroke="url(#chromeBlack)" stroke-width="2"/>

    <!-- Door lines -->
    <line x1="240" y1="226" x2="240" y2="370" stroke="#c0c0c8" stroke-width="1"/>
    <line x1="370" y1="226" x2="370" y2="370" stroke="#c0c0c8" stroke-width="1"/>
    <rect x="230" y="296" width="12" height="4" fill="#c0c0c8" rx="1"/>
    <rect x="360" y="296" width="12" height="4" fill="#c0c0c8" rx="1"/>

    <!-- Side mirror -->
    <ellipse cx="135" cy="281" rx="8" ry="5" fill="url(#bodyColor)" stroke="#555" stroke-width="1"/>

    <!-- Wheels — GUNMETAL GREY -->
    <circle cx="140" cy="370" r="32" fill="#1a1a1a"/>
    <circle cx="140" cy="370" r="28" fill="url(#wheelGunmetal)"/>
    <circle cx="140" cy="370" r="20" fill="none" stroke="#8a8a8e" stroke-width="1"/>
    <circle cx="140" cy="370" r="6" fill="#5a5a5e"/>
    <line x1="140" y1="342" x2="140" y2="398" stroke="#8a8a8e" stroke-width="3"/>
    <line x1="112" y1="370" x2="168" y2="370" stroke="#8a8a8e" stroke-width="3"/>
    <line x1="120" y1="350" x2="160" y2="390" stroke="#8a8a8e" stroke-width="3"/>
    <line x1="160" y1="350" x2="120" y2="390" stroke="#8a8a8e" stroke-width="3"/>

    <circle cx="420" cy="370" r="32" fill="#1a1a1a"/>
    <circle cx="420" cy="370" r="28" fill="url(#wheelGunmetal)"/>
    <circle cx="420" cy="370" r="20" fill="none" stroke="#8a8a8e" stroke-width="1"/>
    <circle cx="420" cy="370" r="6" fill="#5a5a5e"/>
    <line x1="420" y1="342" x2="420" y2="398" stroke="#8a8a8e" stroke-width="3"/>
    <line x1="392" y1="370" x2="448" y2="370" stroke="#8a8a8e" stroke-width="3"/>
    <line x1="400" y1="350" x2="440" y2="390" stroke="#8a8a8e" stroke-width="3"/>
    <line x1="440" y1="350" x2="400" y2="390" stroke="#8a8a8e" stroke-width="3"/>

    <!-- Tire -->
    <circle cx="140" cy="370" r="32" fill="none" stroke="#2a2a2a" stroke-width="8"/>
    <circle cx="420" cy="370" r="32" fill="none" stroke="#2a2a2a" stroke-width="8"/>

    <!-- Lowered indicator -->
    <line x1="100" y1="365" x2="100" y2="355" stroke="#1a365d" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="95" y="350" font-size="9" fill="#1a365d" font-family="Arial">-25mm</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════ -->
  <g transform="translate(30, 440)">
    <rect x="0" y="0" width="8" height="8" fill="#e8e8e8" stroke="#c0c0c0" stroke-width="1"/>
    <text x="12" y="8" font-size="10" fill="#64748b" font-family="Arial">Silver chrome (stock)</text>

    <rect x="150" y="0" width="8" height="8" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="1"/>
    <text x="162" y="8" font-size="10" fill="#64748b" font-family="Arial">Gloss black chrome</text>

    <rect x="300" y="0" width="8" height="8" fill="#7a7a80" stroke="#5a5a5e" stroke-width="1"/>
    <text x="312" y="8" font-size="10" fill="#64748b" font-family="Arial">Gunmetal grey (Plasti Dip)</text>
  </g>
</svg>
